services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: yourusername/price-scrapper:latest
    ports:
      - "50051:50051"
    env_file:
      - .env
    environment:
      DB_ADDRESS: db
      DB_PORT: 5432
      MIGRATIONS: file:///app/db/migrations
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
